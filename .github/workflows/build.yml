name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build ${{ matrix.binary }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            binary: glpipe-linux-amd64

          - os: macos-14
            goos: darwin
            goarch: arm64
            binary: glpipe-darwin-arm64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          PKG=github.com/sebrun/glpipe/internal/build
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          COMMIT=$(git rev-parse --short HEAD)
          BUILD_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          go build \
            -ldflags "-s -w \
              -X '${PKG}.Version=${VERSION}' \
              -X '${PKG}.Commit=${COMMIT}' \
              -X '${PKG}.BuildDate=${BUILD_DATE}'" \
            -o ${{ matrix.binary }} .

      - name: Smoke test (native only)
        if: matrix.goos == runner.os && matrix.goarch == runner.arch
        run: ./${{ matrix.binary }} version

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: ${{ matrix.binary }}
          retention-days: 7

  sign:
    name: Sign binaries (keyless)
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    permissions:
      id-token: write   # OIDC token for keyless signing
      contents: read

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - uses: sigstore/cosign-installer@v3

      - name: Sign binaries
        run: |
          for bin in glpipe-linux-amd64 glpipe-darwin-arm64; do
            cosign sign-blob "$bin" \
              --bundle "${bin}.bundle" \
              --yes
            echo "Signed: ${bin}.bundle"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: bundles
          path: "*.bundle"
          retention-days: 7

  release:
    name: GitHub Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, sign]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Make binaries executable
        run: chmod +x glpipe-linux-amd64 glpipe-darwin-arm64

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            glpipe-linux-amd64
            glpipe-darwin-arm64
            glpipe-linux-amd64.bundle
            glpipe-darwin-arm64.bundle
